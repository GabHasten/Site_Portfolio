<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfólio - Gabriel</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: "Outfit", sans-serif;
      background: linear-gradient(135deg, #2C2657 0%, #0339A6 100%);
      color: #F2F2F2;
    }
    .glass {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(3, 57, 166, 0.3);
      box-shadow: 0 10px 40px -10px rgba(44, 38, 87, 0.5);
      backdrop-filter: blur(12px);
    }
    /* ===== Estilo adicional para seu portfólio ===== */

/* Animação suave nos cards */
.glass {
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}
.glass:hover {
  transform: translateY(-6px);
  box-shadow: 0 15px 50px -10px rgba(3, 57, 166, 0.6);
}

/* Títulos dos projetos */
h2 {
  font-size: 1.25rem;
  font-weight: 600;
  letter-spacing: 0.5px;
}

/* Botões de ação */
a, button {
  transition: all 0.3s ease;
}
a:hover, button:hover {
  transform: scale(1.05);
}

/* Vídeos dentro dos cards */
video {
  border: 2px solid rgba(255, 255, 255, 0.2);
  transition: border-color 0.3s ease;
}
video:hover {
  border-color: #F2F2F2;
}

/* Pop-up de contato */
#popup .rounded-xl {
  animation: aparecer 0.4s ease forwards;
}
@keyframes aparecer {
  from { transform: scale(0.9); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

/* Footer */
footer {
  font-size: 0.9rem;
  letter-spacing: 0.5px;
}
/* ===== Botões do pop-up de contato ===== */
#popup button {
  background: rgba(255, 255, 255, 0.1);
  border: 1px solid rgba(255, 255, 255, 0.2);
  color: #F2F2F2;
  padding: 10px 16px;
  border-radius: 8px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s ease;
  width: 100%;
}

/* Hover geral */
#popup button:hover {
  transform: scale(1.05);
  box-shadow: 0 6px 20px rgba(0,0,0,0.3);
}

/* Botão de Email */
#popup button:nth-of-type(1) {
  background: #2C2657;
}
#popup button:nth-of-type(1):hover {
  background: #1f1a40;
  border-color: #F2F2F2;
}

/* Botão de Telefone */
#popup button:nth-of-type(2) {
  background: #0339A6;
}
#popup button:nth-of-type(2):hover {
  background: #022a7a;
  border-color: #F2F2F2;
}

/* Botão Fechar */
#popup button:nth-of-type(3) {
  background: #A60321;
}
#popup button:nth-of-type(3):hover {
  background: #7a0218;
  border-color: #F2F2F2;
}
  </style>
</head>
<body class="min-h-screen flex flex-col">

  <!-- Header -->
  <header class="fixed top-0 left-0 w-full bg-[#2C2657] shadow-md py-4 px-8 flex justify-between items-center z-50">
    <h1 class="text-xl font-bold text-[#F2F2F2]">Portfólio • Gabriel</h1>
    <nav class="space-x-4">
      <a href="https://www.python.org/ftp/python/3.14.3/python-3.14.3-amd64.exe" class="text-[#F2F2F2] hover:text-[#0339A6]">Baixe o Python</a>
      <a href="#contato" id="btnContato" class="text-[#F2F2F2] hover:text-[#0339A6]">Contato</a>
    </nav>
  </header>

  <!-- Conteúdo -->
  <main class="flex-1 pt-24 px-6">
    <section id="projetos" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-6">
      <!-- Os cards serão adicionados aqui pelo JavaScript -->
    </section>
  </main>

  <!-- Pop-up de contato -->
  <div id="popup" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center">
    <div class="bg-[#0339A6] p-6 rounded-xl shadow-lg max-w-sm text-center flex flex-col space-y-2">
      <h2 class="text-lg font-bold mb-2 text-[#F2F2F2]">Entre em contato</h2>
      <button onclick="window.open('mailto:gabrielhastenreiter58@gmail.com')" class="text-[#F2F2F2]">Email: gabrielhastenreiter58@email.com</button>
      <button onclick="window.open('https://wa.me/5531988542809')" class="text-[#F2F2F2]">Telefone: (31) 98854-2809</button>
      <button onclick="fecharPopup()" 
              class="bg-[#2C2657] text-[#F2F2F2] px-4 py-2 rounded-lg hover:bg-[#1f1a40] transition mt-4">
        Fechar
      </button>
    </div>
  </div>

  <!-- Script -->
  <script>
    // Lista de projetos
const projetos = [
  { 
    titulo: "Automa_Etiquetas", 
    descricao: "Automação desenvolvida em Python + Selenium que realiza a leitura de dados de clientes a partir de uma planilha e gera automaticamente etiquetas de envio dos Correios, preenchendo os formulários e baixando os PDFs prontos para postagem, reduzindo tarefas manuais e acelerando o processo logístico.", 
    arquivo: "automation_correios_selenium.zip",
    video: "Etiquetas.mp4" 
  },
  { 
    titulo: "Automa_Caixa",
    descricao: "Projeto em construção...<br><br>O projeto já esta pronto, está em edição o vídeo para não vazar nenhum dado sensível do cliente."
  }
];

    // Função para criar card
function criarCard(titulo, descricao, arquivo, video) {

  const card = document.createElement("div");

  card.classList.add(
    "glass",
    "rounded-xl",
    "p-6",
    "shadow-lg",
    "flex",
    "flex-col"
  );

  let conteudo = `
    <h2 class="text-lg font-semibold text-[#F2F2F2] mb-2">
      ${titulo}
    </h2>
  `;

  // Se existir vídeo
  if (video) {
    conteudo += `
      <video class="w-full rounded-lg mb-4" controls>
        <source src="${video}" type="video/mp4">
        Seu navegador não suporta vídeo.
      </video>
    `;
  }

  // descrição sempre aparece
  conteudo += `
    <p class="text-sm text-[#F2F2F2] mb-4">
      ${descricao}
    </p>
  `;

  // Se existir arquivo (botão download)
  if (arquivo) {
    conteudo += `
      <a href="${arquivo}" download
        class="mt-auto bg-[#0339A6] text-[#F2F2F2]
        py-2 px-4 rounded-lg text-sm font-medium
        hover:bg-[#2C2657] transition">
        📥 Baixar
      </a>
    `;
  }

  card.innerHTML = conteudo;

  return card;
}

    // Adiciona os cards na página
  window.onload = () => {
    const container = document.getElementById("projetos");
    projetos.forEach(p => {
      container.appendChild(criarCard(p.titulo, p.descricao, p.arquivo, p.video));
    });
  };
  

    // Pop-up de contato
    document.getElementById("btnContato").addEventListener("click", function(event) {
      event.preventDefault(); // impede rolagem para #contato
      document.getElementById("popup").classList.remove("hidden"); // mostra pop-up
    });

    function fecharPopup() {
      document.getElementById("popup").classList.add("hidden"); // esconde pop-up
    }
  </script>

    <!-- Footer -->
  <footer class="bg-[#2C2657] mt-10 shadow-inner py-6 text-center text-sm text-[#F2F2F2]">
    © 2026 Gabriel - Todos os direitos reservados
  </footer>


</body>
</html>
